# MySQL configuration
spring.datasource.url=${CRM_DB_URL:jdbc:mysql://localhost:3306/real_estate_crm?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${CRM_DB_USERNAME:real_estate_crm}
spring.datasource.password=${CRM_DB_PASSWORD:puran}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT
app.jwt.secret=${CRM_JWT_SECRET:RealEstateCrmSuperSecretKeyForJwtSigning2026}
app.jwt.expiration-millis=86400000

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.crm=INFO
