# CORS Configuration

# Allow requests from specific origins
cors.allowed.origins=https://yourdomain.com

# Rate Limiting Settings

# Define maximum requests per second
rate.limiting.enabled=true
rate.limiting.requests.per.second=100

# Security Headers

# Set security headers for better protection
security.headers.X-Content-Type-Options=nosniff
security.headers.X-Frame-Options=SAMEORIGIN
security.headers.X-XSS-Protection=1; mode=block

# Environment Variable Support

# Use environment variables for sensitive configurations
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# MySQL Settings

# MySQL connection settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL5Dialect

# JPA Configuration

# Enable Hibernate SQL logging
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# JWT Configuration

# Secret key used for signing
jwt.secret=your-jwt-secret-here
jwt.expiry=3600

# Logging Configuration

# Set log level
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG

# Swagger API Documentation

# Enable Swagger for API documentation
springfox.documentation.swagger.v2.enabled=true

# Actuator Endpoints for Monitoring

# Enable actuator endpoints
management.endpoints.web.exposure.include=*